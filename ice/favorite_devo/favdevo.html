<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
        <table class="blueTable" style="height: 113px;" width="458">
          <thead>
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Nate Williams</td>
              <td><a href="https://www.byui.edu/speeches/nate-williams/what-really-matters" target="blank">What Really Matters</a></td>
              <td>BYU-Idaho</td>
              <td>2018</td>
            </tr>
            <tr>
              <td>Brian Felt</td>
              <td><a href="https://www.byui.edu/speeches/brian-felt/i-was-a-stranger-and-ye-took-me-in" target="blank">I Was a Stranger, and Ye Took Me in</a></td>
              <td>BYU-Idaho</td>
              <td>2016</td>
            </tr>
            <tr>
              <td>Jason Hunt</td>
              <td><a href="http://byui.edu/speeches/jason-hunt-surviving-and-thriving-despite-the-limbic-system" target="blank">Surviving and Thriving Despite the Limbic System</a></td>
              <td>BYU-Idaho</td>
              <td>2020</td>
            </tr>
          </tbody>
        </table>
        <p>Have a favorite devotional? Send it in below!</p>
        <form>
          <label for="Speaker">Speaker:</label><br>
          <input type="text" id="Speaker"><br>
          <label for="Title">Title:</label><br>
          <input type="text" id="Title"><br>
          <label for="Location">Location:</label><br>
          <input type="text" id="Location"><br>
          <label for="Year">Year:</label><br>
          <input type="text" id="Year"><br>
          <input type="submit" value="Submit">
        </form>
      </div>
    </main>
  </div>
</body>
</html>
