<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        html {
            height: 100%;
        }

        body {
            background: rgb(120, 96, 64);
            height: 100%;
            display: flex;
            align-items: center;
        }

        #formContainer {
            border-style:solid;
            border-radius: 30px;
            border-width: 10px;
            border-color: #0d2e7c;
            overflow: hidden;
            height: 600px;
            width: 400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 175px 50px 1fr 100px;
            background-color: white;
        }

        #header_intro {
            grid-area: 1/1 / 2/2;
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
            width: 100%;
            height: 100%;
            place-items: center;
            align-content: center;
            display: grid;
            position: relative;
        }

        #header_intro h1, #header_intro h2 {
            color: white;
            text-shadow: 2px 2px 2px black;
            font-size: 2em;
        }

        #header_intro h1 {
            margin-top: 50px;
            font-size: 2.2em;
        }

        #header_intro h2 {
            font-weight: 100;
        }

        #closeBtn {
            position: absolute;
            top: 15px;
            left: 15px;
        }

        #formContainer h3 {
            text-align: center;
            place-self: center;
            text-shadow: 0px 0px 1px black;
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            /* gap: 20px 0px; */
            padding: 0px 20px;
            box-sizing: border-box;
        }

        #myForm label {
            grid-column-start: 1;
        }

        #myForm input {
            grid-column-start: 2;
            height: 1em;
        }

        #myForm section {
            justify-self: center;
            grid-column: 1/3;
        }

        #scripture_bar {
            display: flex;
            grid-template-columns: repeat(5,1fr);
            width: 100%;
            justify-content: space-between;
        }
        
        #scripture_bar img {
            height: 100px;
        }

    </style>

</head>

<body>
    <div id="formContainer">
        <div id="header_intro">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3><b>Sign Up for Daily Scripture Feed</b></h3>
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="scripture_bar">
            <img src="images/old_testament.webp" alt="Cover of the Old Testament">
            <img src="images/new_testament.webp" alt="Cover of the New Testament">
            <img src="images/book_of_mormon.webp" alt="Cover of the Book of Mormon">
            <img src="images/doctrine_and_covenants.webp" alt="Cover of the Doctrine and Covenants">
            <img src="images/pearl_of_great_price.webp" alt="Cover of the Pearl of Great Price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
