<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background-color: #E8ECED;
            font-family: Arial, Helvetica, sans-serif;
        }

        #wrapper {
            background-image: url("images/christus.webp");
            background-position: center;
            background-size: cover;
            width: 1000px;
            height: 800px;
            margin: 0 auto;
            border-style: solid;
            border-width: 8px;
            border-radius: 40px;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 60px 175px 60px 400px;
            padding: 0 200px;
            box-sizing: border-box;
        }

        img {
            border-style: solid;
            border-color: #E8ECED;
            border-width: 8px;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            object-fit: cover;
            object-position: top center;
        }


        h1 {
            grid-column: 1;
            grid-row: 1;
            margin: 0 auto;
            color: #E8ECED;
            font-size: 3em;
            font-weight: 1;
            align-self: center;
        }

        #presidency_box {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            margin: 0 auto;
            gap: 30px;
        }

        h2 {
            grid-column:1;
            grid-row: 3;
            margin: 0 auto;
            color: #E8ECED;
            align-self:center;
            font-size: 1.75em;
            font-weight: 1;
        }

        #quorum_box {
            grid-column: 1;
            grid-row: 4;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(4,150px);
            margin: 0 auto;
            grid-column-gap: 20px;
        }

        .counselor {
            align-self:end;
        }

        .counselor img {
            width: 120px;
            height: 120px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .counselor img:hover {
            transform: scale(1.1);
            border-color: rgb(128, 128, 128);
        }

        .prophet {
            align-self:end;
        }

        .prophet img {
            width: 150px;
            height: 150px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .prophet img:hover {
            transform: scale(1.1);
            border-color: rgb(128, 128, 128);
        }

        .quorum_of_twelve img {
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .quorum_of_twelve img:hover {
            transform: scale(1.15);
            border-color: rgb(128, 128, 128);
        }

    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
     <div id="wrapper">
        <h1>First Presidency</h1>
        <div id="presidency_box">
            <a class="counselor" href="https://www.churchofjesuschrist.org/learn/henry-b-eyring" target="blank"><img src="images/eyring.webp" alt="Portrait photo of Henry B. Eyring"></a>
            <a class="prophet" href="https://www.churchofjesuschrist.org/learn/dallin-h-oaks" target="blank"><img src="images/oaks.webp" alt="Portrait photo of Dallin H. Oaks"></a>
            <a class="counselor" href="https://www.churchofjesuschrist.org/learn/d-todd-christofferson" target="blank"><img src="images/christofferson.webp" alt="Portrait photo of D. Todd Christofferson"></a>
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div id="quorum_box">
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/jeffrey-r-holland" target="blank"><img src="images/holland.webp" alt="Portrait of Jeffrey R. Holland"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/david-a-bednar" target="blank"><img src="images/bednar.webp" alt="Portrait of David A. Bednar"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/dieter-f-uchtdorf" target="blank"><img src="images/uchtdorf.webp" alt="Portrait of Dieter F. Uchtdorf"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/quentin-l-cook" target="blank"><img src="images/cook.webp" alt="Portrait of Quentin L. Cook"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/neil-l-andersen" target="blank"><img src="images/andersen.webp" alt="Portrait of Neil L. Andersen"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/ronald-a-rasband" target="blank"><img src="images/rasband.webp" alt="Portrait of Ronald A. Rasband"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/gary-e-stevenson" target="blank"><img src="images/stevenson.webp" alt="Portrait of Gary E. Stevenson"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/dale-g-renlund" target="blank"><img src="images/renlund.webp" alt="Portrait of Dale G. Renlund"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/gerrit-w-gong" target="blank"><img src="images/gong.webp" alt="Portrait of Gerrit W. Gong"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/ulisses-soares" target="blank"><img src="images/soares.webp" alt="Portrait of Ulisses Soares"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/patrick-kearon" target="blank"><img src="images/kearon.webp" alt="Portrait of Patrick Kearon"></a>
            <a class="quorum_of_twelve" href="https://www.churchofjesuschrist.org/learn/gerald-j-causse" target="blank"><img src="images/causse.webp" alt="Portrait of Gerald Causse"></a>
        </div>
     </div>
</body>
</html>
